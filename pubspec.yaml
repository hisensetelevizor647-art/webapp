name: oleksandrai
description: OleksandrAi — universal AI platform (Flutter Android port).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Auth
  google_sign_in: ^6.2.1

  # Networking
  http: ^1.2.2

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4
  cached_network_image: ^3.4.1

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # System integration (widgets + overlay + permissions)
  home_widget: ^0.7.0
  flutter_overlay_window: ^0.4.5
  permission_handler: ^11.3.1

  # State/util
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  # Inter is pulled at runtime via the `google_fonts` package so there's no
  # need to ship TTFs in the APK.
